name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: --deny warnings

jobs:
  security_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@cargo-deny
      - name: Scan for vulnerabilities
        run: cargo deny check

  check_if_pr:
    runs-on: ubuntu-latest
    outputs:
      is_pr: ${{ steps.check.outputs.is_pr }}
    steps:
      - name: Check if it's a PR
        id: check
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "is_pr=true" >> $GITHUB_OUTPUT
          else
            echo "is_pr=false" >> $GITHUB_OUTPUT
          fi

  no-merge-commits:
    needs: check_if_pr
    if: needs.check_if_pr.outputs.is_pr == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run test
        uses: NexusPHP/no-merge-commits@v2.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  conventional:
    needs: [check_if_pr, no-merge-commits]
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: webiny/action-conventional-commits@v1.4.2

  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Run rustfmt checks
        run: cargo fmt --check

  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [msrv, stable]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - run: rustup toolchain install ${{ matrix.rust == 'msrv' && ' ' || matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy lints
        if: ${{ matrix.os != 'windows-latest' }}
        run: cargo clippy -- --no-deps -D warnings
      - name: Run unit tests
        run: cargo test -- --skip cli_tests
      - name: Run integration test
        run: cargo test -- cli_tests --skip cli_tests_linux --test-threads 1

  tests-freebsd:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Compile
        uses: vmactions/freebsd-vm@v1
        with:
          release: '15.0'
          usesh: true
          prepare: |
            pkg install -y curl git
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            . ~/.cargo/env
            git config --global --add safe.directory /home/runner/work/eza/eza
          run: |
            set -e
            . ~/.cargo/env
            export CARGO_TERM_COLOR="always"
            export RUSTFLAGS="--deny warnings"
            cargo clippy -- --no-deps -D warnings
            cargo test -- --skip cli_tests
            cargo test -- cli_tests --test-threads 1

  tests-netbsd:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Compile
        uses: vmactions/netbsd-vm@v1
        with:
          release: '10.1'
          usesh: true
          prepare: |
            PATH="/root/.cargo/bin:/usr/pkg/sbin:/usr/pkg/bin:$PATH"
            PKG_PATH="https://ftp.netbsd.org/pub/pkgsrc/packages/NetBSD/amd64/10.1/All/"
            export PATH PKG_PATH
            /usr/sbin/pkg_add -uu curl git
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            . ~/.cargo/env
            git config --global --add safe.directory /home/runner/work/eza/eza
          run: |
            set -e
            . ~/.cargo/env
            export CARGO_TERM_COLOR="always"
            export RUSTFLAGS="--deny warnings"
            cargo clippy -- --no-deps -D warnings
            cargo test -- --skip cli_tests
            cargo test -- cli_tests --test-threads 1

  tests-openbsd:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Compile
        uses: vmactions/openbsd-vm@v1
        with:
          release: '7.8'
          usesh: true
          prepare: |
            pkg_add rust rust-rustfmt rust-clippy git
            git config --global --add safe.directory /home/runner/work/eza/eza
          run: |
            set -e
            export CARGO_TERM_COLOR="always"
            # Do not treat warnings as failure, since OpenBSD lags behind "rustup" versions.
            # https://github.com/rust-lang/rustup/issues/2377
            # https://github.com/rust-lang/rustup/issues/2168
            # export RUSTFLAGS="--deny warnings"
            # cargo clippy -- --no-deps -D warnings
            cargo test -- --skip cli_tests
            cargo test -- cli_tests --test-threads 1

  tests-linux-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install test dependencies
        uses: extractions/setup-just@v4

      - name: Run integration tests
        run: just integration-tests
